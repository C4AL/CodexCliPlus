name: 功能请求
description: 提议一个清晰的功能或改进
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: 背景和问题
      description: 说明当前工作流中缺少什么。
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: 期望方案
      description: 描述你希望看到的行为、界面或命令。
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: 已考虑的替代方案
      description: 如果有，请列出替代实现或临时绕过方式。
