name: CI

on:
  pull_request:
    branches:
      - main
    paths:
      - ".github/workflows/ci.yml"
      - ".config/dotnet-tools.json"
      - "CodexCliPlus.sln"
      - "Directory.Build.props"
      - "global.json"
      - "build/**"
      - "src/**"
      - "tests/**"
      - "tools/Invoke-Tests.ps1"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/ci.yml"
      - ".config/dotnet-tools.json"
      - "CodexCliPlus.sln"
      - "Directory.Build.props"
      - "global.json"
      - "build/**"
      - "src/**"
      - "tests/**"
      - "tools/Invoke-Tests.ps1"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    name: build-and-test
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Setup .NET
        uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore CodexCliPlus.sln --locked-mode

      - name: Build
        run: dotnet build CodexCliPlus.sln --configuration Release --no-restore

      - name: Test quick suite
        shell: pwsh
        run: ./tools/Invoke-Tests.ps1 -Scope Quick -NoBuild
