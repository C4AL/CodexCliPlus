name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  build:
    name: build-and-test
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Setup .NET
        uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7
        with:
          dotnet-version: 10.0.x

      - name: Restore .NET tools
        run: dotnet tool restore

      - name: Restore
        run: dotnet restore CodexCliPlus.sln

      - name: Build
        run: dotnet build CodexCliPlus.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test tests/CodexCliPlus.Tests/CodexCliPlus.Tests.csproj --configuration Release --no-build --verbosity normal --collect:"XPlat Code Coverage" --results-directory artifacts/test-results --logger "trx;LogFileName=codexcliplus-tests.trx"

      - name: Generate coverage report
        run: dotnet tool run reportgenerator -- "-reports:artifacts/test-results/**/coverage.cobertura.xml" "-targetdir:artifacts/coverage" "-reporttypes:Html;TextSummary;Cobertura"

      - name: Publish coverage summary
        shell: pwsh
        run: |
          $summaryPath = "artifacts/coverage/Summary.txt"
          if (Test-Path $summaryPath) {
            "## .NET coverage" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append
            "" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append
            '```' | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append
            Get-Content -Raw $summaryPath | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append
            '```' | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append
          }

      - name: Upload test and coverage artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: dotnet-test-coverage
          path: |
            artifacts/test-results
            artifacts/coverage
