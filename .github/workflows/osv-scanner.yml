name: OSV-Scanner

on:
  schedule:
    - cron: "17 21 * * 4"
  workflow_dispatch:

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  scan:
    uses: google/osv-scanner-action/.github/workflows/osv-scanner-reusable.yml@c51854704019a247608d928f370c98740469d4b5
    with:
      scan-args: |-
        --recursive
        .
