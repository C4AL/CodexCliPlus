name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version without leading v"
        required: true
        default: "1.0.0"

permissions:
  contents: write
  id-token: write
  attestations: write
  artifact-metadata: write
  security-events: write

jobs:
  release:
    name: build-release
    runs-on: windows-latest
    env:
      CODEXCLIPLUS_SIGNING_REQUIRED: "true"
      WINDOWS_CODESIGN_PFX_BASE64: ${{ secrets.WINDOWS_CODESIGN_PFX_BASE64 }}
      WINDOWS_CODESIGN_PFX_PASSWORD: ${{ secrets.WINDOWS_CODESIGN_PFX_PASSWORD }}
      WINDOWS_CODESIGN_TIMESTAMP_URL: ${{ vars.WINDOWS_CODESIGN_TIMESTAMP_URL || 'http://timestamp.digicert.com' }}

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7
        with:
          dotnet-version: 10.0.x

      - name: Setup Go
        uses: actions/setup-go@44694675825211faa026b3c33043df3e48a5fa00
        with:
          go-version: 1.26.2

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: resources/webui/upstream/source/package-lock.json

      - name: Resolve release version
        shell: pwsh
        run: |
          if ($env:GITHUB_REF_TYPE -eq "tag") {
            $version = $env:GITHUB_REF_NAME.TrimStart("v")
          } else {
            $version = "${{ inputs.version }}"
          }

          if ([string]::IsNullOrWhiteSpace($version)) {
            throw "Release version is required."
          }

          "RELEASE_VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Restore tools
        run: dotnet tool restore

      - name: Restore .NET packages
        run: dotnet restore CodexCliPlus.sln

      - name: Build .NET
        run: dotnet build CodexCliPlus.sln --configuration Release --no-restore

      - name: Test .NET with coverage
        run: dotnet test tests/CodexCliPlus.Tests/CodexCliPlus.Tests.csproj --configuration Release --no-build --verbosity normal --filter "Category!=LiveBackend&Category!=Smoke" --collect:"XPlat Code Coverage" --results-directory artifacts/test-results --logger "trx;LogFileName=codexcliplus-tests.trx"

      - name: Generate .NET coverage report
        run: dotnet tool run reportgenerator -- "-reports:artifacts/test-results/**/coverage.cobertura.xml" "-targetdir:artifacts/coverage" "-reporttypes:Html;TextSummary;Cobertura"

      - name: Install web dependencies
        working-directory: resources/webui/upstream/source
        run: npm ci

      - name: Lint web
        working-directory: resources/webui/upstream/source
        run: npm run lint

      - name: Type-check web
        working-directory: resources/webui/upstream/source
        run: npm run type-check

      - name: Test web
        working-directory: resources/webui/upstream/source
        run: npm run test

      - name: Build release artifacts
        shell: pwsh
        run: |
          $project = "src/CodexCliPlus.BuildTool/CodexCliPlus.BuildTool.csproj"
          dotnet run --project $project -- fetch-assets --version $env:RELEASE_VERSION
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          dotnet run --project $project -- verify-assets --version $env:RELEASE_VERSION
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          dotnet run --project $project -- build-webui --version $env:RELEASE_VERSION
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          dotnet run --project $project -- publish --configuration Release --runtime win-x64 --version $env:RELEASE_VERSION
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          dotnet run --project $project -- package-offline-installer --configuration Release --runtime win-x64 --version $env:RELEASE_VERSION
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          dotnet run --project $project -- package-update --configuration Release --runtime win-x64 --version $env:RELEASE_VERSION
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          dotnet run --project $project -- verify-package --configuration Release --runtime win-x64 --version $env:RELEASE_VERSION
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Generate SBOM
        run: dotnet dotnet-CycloneDX CodexCliPlus.sln -o artifacts/sbom -fn codexcliplus.cyclonedx.xml

      - name: Write checksums
        run: dotnet run --project src/CodexCliPlus.BuildTool/CodexCliPlus.BuildTool.csproj -- write-checksums --configuration Release --runtime win-x64 --version $env:RELEASE_VERSION

      - name: Export public release files
        run: dotnet run --project src/CodexCliPlus.BuildTool/CodexCliPlus.BuildTool.csproj -- export-public-release --configuration Release --runtime win-x64 --version $env:RELEASE_VERSION

      - name: Generate artifact attestations
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26
        with:
          subject-path: |
            artifacts/buildtool/public-release/*

      - name: Upload release artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: codexcliplus-release
          path: |
            artifacts/buildtool/public-release
