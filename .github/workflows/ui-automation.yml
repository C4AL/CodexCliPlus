name: UI Automation

on:
  schedule:
    - cron: "29 18 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ui-tests:
    name: ui-tests
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Setup .NET
        uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore CodexCliPlus.sln

      - name: Build
        run: dotnet build CodexCliPlus.sln --configuration Release --no-restore

      - name: Run UI tests
        run: dotnet test tests/CodexCliPlus.UiTests/CodexCliPlus.UiTests.csproj --configuration Release --no-build --verbosity normal --logger "trx;LogFileName=codexcliplus-ui-tests.trx" --results-directory artifacts/ui-test-results

      - name: Upload UI test artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: ui-test-results
          path: artifacts/ui-test-results
          if-no-files-found: warn
