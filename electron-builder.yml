appId: BlackblockInc.CPAD
productName: Cli Proxy API Desktop
artifactName: ${productName}-${version}-${arch}.${ext}
asar: true

directories:
  output: release

files:
  - out/**/*
  - package.json
  - '!**/*.map'

extraFiles:
  - from: sources
    to: sources
    filter:
      - '**/*'
      - '!**/node_modules/**/*'
      - '!**/dist/**/*'
      - '!**/out/**/*'
      - '!**/release/**/*'
      - '!**/.vite/**/*'
      - '!**/coverage/**/*'
  - from: plugins
    to: plugin-source
    filter:
      - '**/*'
      - '!**/node_modules/**/*'
      - '!**/dist/**/*'
      - '!**/out/**/*'
      - '!**/release/**/*'
      - '!**/.vite/**/*'
      - '!**/coverage/**/*'
  - from: scripts/package-layout/root
    to: .
    filter:
      - '**/*'
  - from: scripts/package-layout/sources
    to: sources
    filter:
      - '**/*'
  - from: scripts/package-layout/plugin-source
    to: plugin-source
    filter:
      - '**/*'
  - from: scripts/package-layout/plugins
    to: plugins
    filter:
      - '**/*'

extraResources:
  - from: service/bin
    to: bin
    filter:
      - cpad-service.exe
      - codex.exe
  - from: ico
    to: ico
    filter:
      - '**/*'

win:
  executableName: Cli Proxy API Desktop
  signAndEditExecutable: false
  target:
    - target: nsis
      arch:
        - x64
    - target: portable
      arch:
        - x64

nsis:
  artifactName: ${productName}-Setup-${version}-${arch}.${ext}
  oneClick: false
  allowToChangeInstallationDirectory: true
  perMachine: false
  createDesktopShortcut: always
  createStartMenuShortcut: true

portable:
  artifactName: ${productName}-Portable-${version}-${arch}.${ext}
